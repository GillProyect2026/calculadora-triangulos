<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final Gillian Baca González</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #9d50bb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 95%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .instruction-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .badge {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .field { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        
        input {
            background: #0f172a;
            border: 2px solid #334155;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.2); }

        .btn-main {
            grid-column: span 2;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .visual-box {
            background: #0f172a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 350px;
            position: relative;
        }

        svg { filter: drop-shadow(0 0 10px var(--neon-blue)); }

        .res-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            width: 100%;
            display: none;
        }

        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="instruction-header">
        <span class="badge">Importante: Introduce 3 datos (Lados o Ángulos)</span>
        <h1 style="margin: 10px 0;">Triangulador Pro v2.0 Gillian Baca Glz.</h1>
    </div>

    <div class="layout">
        <div class="input-grid">
            <div class="field"><label>Lado (a)</label><input type="number" id="a" step="any"></div>
            <div class="field"><label>Ángulo (A°)</label><input type="number" id="A_ang" step="any"></div>
            <div class="field"><label>Lado (b)</label><input type="number" id="b" step="any"></div>
            <div class="field"><label>Ángulo (B°)</label><input type="number" id="B_ang" step="any"></div>
            <div class="field"><label>Lado (c)</label><input type="number" id="c" step="any"></div>
            <div class="field"><label>Ángulo (C°)</label><input type="number" id="C_ang" step="any"></div>
            <button class="btn-main" onclick="processTriangle()">CALCULAR Y GENERAR</button>
        </div>

        <div class="visual-box">
            <svg id="canvas" width="300" height="250" viewBox="0 0 300 250">
                <polygon id="poly" points="" fill="rgba(0, 242, 254, 0.2)" stroke="#00f2fe" stroke-width="4" stroke-linejoin="round"/>
            </svg>
            <div id="results" class="res-box"></div>
        </div>
    </div>
</div>

<script>
    const rad = (d) => d * Math.PI / 180;
    const deg = (r) => r * 180 / Math.PI;

    function processTriangle() {
        let a = parseFloat(document.getElementById('a').value);
        let b = parseFloat(document.getElementById('b').value);
        let c = parseFloat(document.getElementById('c').value);
        let A = parseFloat(document.getElementById('A_ang').value);
        let B = parseFloat(document.getElementById('B_ang').value);
        let C = parseFloat(document.getElementById('C_ang').value);

        const vals = [a, b, c, A, B, C].filter(v => !isNaN(v)).length;
        if (vals < 3) { alert("¡Error! Se requieren exactamente 3 valores."); return; }

        try {
            // CASO LLL (Lado, Lado, Lado)
            if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
                A = deg(Math.acos((b*b + c*c - a*a) / (2*b*c)));
                B = deg(Math.acos((a*a + c*c - b*b) / (2*a*c)));
                C = 180 - A - B;
            }
            // CASO LAL (Ejemplo: a, C, b)
            else if (!isNaN(a) && !isNaN(b) && !isNaN(C)) {
                c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(rad(C)));
                A = deg(Math.acos((b*b + c*c - a*a) / (2*b*c)));
                B = 180 - A - C;
            }
            // CASO ALA (Ejemplo: A, c, B)
            else if (!isNaN(A) && !isNaN(B) && !isNaN(c)) {
                C = 180 - A - B;
                a = (c * Math.sin(rad(A))) / Math.sin(rad(C));
                b = (c * Math.sin(rad(B))) / Math.sin(rad(C));
            }
            else {
                alert("Para esta versión, usa: 3 lados, 2 lados + 1 ángulo, o 2 ángulos + 1 lado.");
                return;
            }

            if (isNaN(a) || a <= 0) throw new Error("Triángulo imposible.");

            render(a, b, c, A, B, C);
        } catch (e) {
            alert("Error: Los datos no forman un triángulo geométricamente posible.");
        }
    }

    function render(a, b, c, A, B, C) {
        const poly = document.getElementById('poly');
        const res = document.getElementById('results');
        
        // Escalamiento dinámico para que quepa en el cuadro
        const scale = 180 / Math.max(a, b, c);
        const sa = a * scale, sb = b * scale, sc = c * scale;

        // Puntos
        const x1 = 50, y1 = 200; // Punto A
        const x2 = x1 + sc, y2 = 200; // Punto B
        const x3 = x1 + sb * Math.cos(rad(A));
        const y3 = y1 - sb * Math.sin(rad(A));

        poly.setAttribute("points", `${x1},${y1} ${x2},${y2} ${x3},${y3}`);
        
        res.style.display = "block";
        res.innerHTML = `
            <div style="color:var(--neon-blue); font-weight:bold; margin-bottom:5px;">Resultados Finales:</div>
            Lados: ${a.toFixed(2)} | ${b.toFixed(2)} | ${c.toFixed(2)}<br>
            Ángulos: ${A.toFixed(1)}° | ${B.toFixed(1)}° | ${C.toFixed(1)}°
        `;
    }
</script>
</body>
</html>
