<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeltaViz Ultra - Clasificador Pro</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #9d50bb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 95%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .instruction-header { text-align: center; margin-bottom: 25px; }

        .badge {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        
        input {
            background: #0f172a;
            border: 2px solid #334155;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.2); }

        .btn-main {
            grid-column: span 2;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .visual-box {
            background: #0f172a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 350px;
        }

        .type-badge {
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0, 242, 254, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            display: none;
        }

        .res-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            width: 100%;
            display: none;
        }

        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="instruction-header">
        <span class="badge">Requerido: 3 lados o grados</span>
        <h1 style="margin: 10px 0;">Triangulador Por Gillian Baca Glz.</h1>
    </div>

    <div class="layout">
        <div class="input-grid">
            <div class="field"><label>Lado (a)</label><input type="number" id="a" step="any"></div>
            <div class="field"><label>Ángulo (A°)</label><input type="number" id="A_ang" step="any"></div>
            <div class="field"><label>Lado (b)</label><input type="number" id="b" step="any"></div>
            <div class="field"><label>Ángulo (B°)</label><input type="number" id="B_ang" step="any"></div>
            <div class="field"><label>Lado (c)</label><input type="number" id="c" step="any"></div>
            <div class="field"><label>Ángulo (C°)</label><input type="number" id="C_ang" step="any"></div>
            <button class="btn-main" onclick="processTriangle()">ANALIZAR TRIÁNGULO</button>
        </div>

        <div class="visual-box">
            <svg id="canvas" width="300" height="250" viewBox="0 0 300 250">
                <polygon id="poly" points="" fill="rgba(0, 242, 254, 0.2)" stroke="#00f2fe" stroke-width="4" stroke-linejoin="round"/>
            </svg>
            <div id="typeText" class="type-badge"></div>
            <div id="results" class="res-box"></div>
        </div>
    </div>
</div>

<script>
    const rad = (d) => d * Math.PI / 180;
    const deg = (r) => r * 180 / Math.PI;

    function processTriangle() {
        let a = parseFloat(document.getElementById('a').value);
        let b = parseFloat(document.getElementById('b').value);
        let c = parseFloat(document.getElementById('c').value);
        let A = parseFloat(document.getElementById('A_ang').value);
        let B = parseFloat(document.getElementById('B_ang').value);
        let C = parseFloat(document.getElementById('C_ang').value);

        try {
            // Lógica SSS
            if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
                A = deg(Math.acos((b*b + c*c - a*a) / (2*b*c)));
                B = deg(Math.acos((a*a + c*c - b*b) / (2*a*c)));
                C = 180 - A - B;
            }
            // Lógica SAS (a, C, b)
            else if (!isNaN(a) && !isNaN(b) && !isNaN(C)) {
                c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(rad(C)));
                A = deg(Math.acos((b*b + c*c - a*a) / (2*b*c)));
                B = 180 - A - C;
            }
            // Lógica ALA (A, c, B)
            else if (!isNaN(A) && !isNaN(B) && !isNaN(c)) {
                C = 180 - A - B;
                a = (c * Math.sin(rad(A))) / Math.sin(rad(C));
                b = (c * Math.sin(rad(B))) / Math.sin(rad(C));
            } else {
                throw new Error();
            }

            if (isNaN(a) || a <= 0 || A <= 0 || B <= 0 || C <= 0) throw new Error();

            render(a, b, c, A, B, C);
        } catch (e) {
            alert("Combinación no soportada o triángulo imposible. Prueba con 3 lados.");
        }
    }

    function getClassification(a, b, c, A, B, C) {
        let sideType = "";
        let angleType = "";

        // Por lados (usando un margen de error pequeño por decimales)
        const eps = 0.1;
        if (Math.abs(a-b) < eps && Math.abs(b-c) < eps) sideType = "Equilátero";
        else if (Math.abs(a-b) < eps || Math.abs(b-c) < eps || Math.abs(a-c) < eps) sideType = "Isósceles";
        else sideType = "Escaleno";

        // Por ángulos
        const maxAngle = Math.max(A, B, C);
        if (Math.abs(maxAngle - 90) < 0.5) angleType = "Rectángulo";
        else if (maxAngle > 90.5) angleType = "Obtusángulo";
        else angleType = "Acutángulo";

        return `${sideType} ${angleType}`;
    }

    function render(a, b, c, A, B, C) {
        const poly = document.getElementById('poly');
        const res = document.getElementById('results');
        const typeBox = document.getElementById('typeText');
        
        const scale = 180 / Math.max(a, b, c);
        const sa = a * scale, sb = b * scale, sc = c * scale;

        const x1 = 50, y1 = 200;
        const x2 = x1 + sc, y2 = 200;
        const x3 = x1 + sb * Math.cos(rad(A));
        const y3 = y1 - sb * Math.sin(rad(A));

        poly.setAttribute("points", `${x1},${y1} ${x2},${y2} ${x3},${y3}`);
        
        typeBox.style.display = "block";
        typeBox.innerText = "Tipo: " + getClassification(a, b, c, A, B, C);

        res.style.display = "block";
        res.innerHTML = `
            Lados: a:${a.toFixed(1)} b:${b.toFixed(1)} c:${c.toFixed(1)}<br>
            Ángulos: A:${A.toFixed(1)}° B:${B.toFixed(1)}° C:${C.toFixed(1)}°
        `;
    }
</script>
</body>
</html>
